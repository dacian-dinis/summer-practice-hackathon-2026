<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>ShowUp2Move — Final</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; background: #0a0a0a; color: #fff;
    font-family: 'Archivo', sans-serif; }
  #root { width: 100vw; height: 100vh; }
  .dc-note { font-family: 'JetBrains Mono', monospace; font-size: 12px;
    line-height: 1.6; opacity: 0.75; max-width: 640px; }
  .dc-note b { color: #F26B1F; font-weight: 600; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="final-pin.jsx"></script>

<script type="text/babel">
const { DesignCanvas, DCSection, DCArtboard } = window;
const W = 920, H = 520;

const App = () => (
  <DesignCanvas
    title="ShowUp2Move — Final"
    subtitle="Pin + vertical chevrons · refined per reference."
  >
    <DCSection
      id="primary"
      title="Primary lockup"
      note={<div className="dc-note">
        Refinements vs. the reference: chevrons are <b>cleaner geometry</b> (true notched
        chevrons, not stripes), <b>tighter wordmark kerning</b>, the metadata uses a real
        Archivo SemiBold instead of monospace caps, dot separators in brand-orange.
        Pin gets a faint ground-shadow so it feels planted.
      </div>}
    >
      <DCArtboard id="primary" label="Primary · light" width={W} height={H}><Primary /></DCArtboard>
      <DCArtboard id="dark" label="Primary · dark" width={W} height={H}><Dark /></DCArtboard>
      <DCArtboard id="stacked" label="Stacked lockup" width={W} height={H}><Stacked /></DCArtboard>
    </DCSection>

    <DCSection
      id="system"
      title="Mark system"
      note={<div className="dc-note">
        Scale test, color treatments, chevron-count tuning. Default is 3 chevrons; 4 reads
        more like a runner's pace ladder, 1 is the boldest at small sizes.
      </div>}
    >
      <DCArtboard id="sizes" label="Mark · scale test" width={W} height={H}><MarkSizes /></DCArtboard>
      <DCArtboard id="treat" label="Color treatments" width={W} height={H}><Treatments /></DCArtboard>
      <DCArtboard id="counts" label="Chevron count tuning" width={W} height={H}><ChevronCounts /></DCArtboard>
    </DCSection>

    <DCSection
      id="contexts"
      title="In context"
      note={<div className="dc-note">
        App-icon comparison across the 4 brand surfaces, splash screen, and a card mock.
      </div>}
    >
      <DCArtboard id="icons" label="App icons" width={W} height={H}><AppIcons /></DCArtboard>
      <DCArtboard id="splash" label="Splash · launch" width={W} height={H}><Splash /></DCArtboard>
      <DCArtboard id="card" label="Business card" width={W} height={H}><Card /></DCArtboard>
    </DCSection>
  </DesignCanvas>
);

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
